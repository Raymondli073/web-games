<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }

    #reset:hover {
      background: #e94560;
      color: #fff;
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label { color: #888; font-size: 0.8rem; }
    .score-box .value { font-size: 1.8rem; font-weight: bold; }
    .score-box.x-score .value { color: #e94560; }
    .score-box.o-score .value { color: #a8dadc; }
    .score-box.tie-score .value { color: #f4a261; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="scores">
    <div class="score-box x-score">
      <div class="label">X</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box tie-score">
      <div class="label">TIES</div>
      <div class="value" id="score-tie">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">O</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    const scores = { x: 0, o: 0, tie: 0 };

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const cells = [];

    // Build cells
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.addEventListener('click', () => handleClick(i));
      boardEl.appendChild(cell);
      cells.push(cell);
    }

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      cells.forEach(c => { c.className = 'cell'; c.textContent = ''; });
      statusEl.textContent = "X's turn";
    }

    function handleClick(i) {
      if (over || board[i]) return;
      board[i] = current;
      const cell = cells[i];
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const winner = checkWinner();
      if (winner) {
        winner.forEach(idx => cells[idx].classList.add('win'));
        statusEl.textContent = `${current} wins!`;
        scores[current.toLowerCase()]++;
        updateScores();
        over = true;
      } else if (board.every(Boolean)) {
        statusEl.textContent = "It's a tie!";
        scores.tie++;
        updateScores();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        statusEl.textContent = `${current}'s turn`;
      }
    }

    function checkWinner() {
      for (const combo of WINS) {
        const [a, b, c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return combo;
      }
      return null;
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.x;
      document.getElementById('score-o').textContent = scores.o;
      document.getElementById('score-tie').textContent = scores.tie;
    }

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
